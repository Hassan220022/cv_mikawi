name: Build CV

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended

      - name: Install ImageMagick
        run: |
          sudo apt-get install -y imagemagick ghostscript

      - name: Configure ImageMagick for PDF conversion
        run: |
          sudo sed -i '/disable ghostscript format types/,+6d' /etc/ImageMagick-6/policy.xml
          echo '<policy domain="coder" rights="read|write" pattern="PDF" />' | sudo tee -a /etc/ImageMagick-6/policy.xml

      - name: Compile LaTeX to PDF
        run: |
          pdflatex mikawi_CV.tex
          pdflatex mikawi_CV.tex

      - name: Clean up LaTeX auxiliary files
        run: |
          rm -f mikawi_CV.aux mikawi_CV.log mikawi_CV.out

      - name: Convert PDF to PNG
        run: |
          convert -density 300 -trim mikawi_CV.pdf -quality 100 -flatten mikawi_CV.png
          mv mikawi_CV.png PNG/

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mikawi_CV.pdf PNG/mikawi_CV.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update CV [skip ci]" && git push)
